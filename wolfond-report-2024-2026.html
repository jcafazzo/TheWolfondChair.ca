<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wolfond Chair in Digital Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #0a0a0a;
  --white: #fafafa;
  --gray-100: #f5f5f5;
  --gray-200: #e5e5e5;
  --gray-400: #a3a3a3;
  --gray-500: #737373;
  --gray-600: #525252;
  --gray-800: #262626;
  --gray-900: #171717;
  --serif: 'Playfair Display', 'Georgia', serif;
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
  --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

html { -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--sans);
  color: var(--black);
  background: var(--white);
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
  height: 100svh;
}

a { color: var(--black); }

/* ═══ Slide deck ═══ */
.deck { height: 100vh; height: 100svh; overflow: hidden; position: relative; }

.slide {
  position: absolute; inset: 0;
  display: flex; align-items: flex-start; justify-content: center;
  opacity: 0; transform: translateY(40px);
  transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: none; overflow-y: auto; overflow-x: hidden;
  touch-action: pan-y;
  overscroll-behavior-x: contain;
  -webkit-tap-highlight-color: transparent;
}
.slide.active { opacity: 1; transform: translateY(0); pointer-events: auto; z-index: 2; }
.slide.exiting { opacity: 0; transform: translateY(-30px); pointer-events: none; z-index: 1; }

/* Staggered entrance for child elements */
.slide.active .stagger { opacity: 0; transform: translateY(24px); animation: staggerIn 0.7s ease forwards; }
.slide.active .stagger:nth-child(1) { animation-delay: 0.15s; }
.slide.active .stagger:nth-child(2) { animation-delay: 0.3s; }
.slide.active .stagger:nth-child(3) { animation-delay: 0.45s; }
.slide.active .stagger:nth-child(4) { animation-delay: 0.6s; }
@keyframes staggerIn { to { opacity: 1; transform: translateY(0); } }

/* Initial page load fade */
body { animation: bodyIn 1s ease forwards; }
@keyframes bodyIn { from { opacity: 0; } to { opacity: 1; } }

.slide-inner {
  width: 100%; min-height: 100vh; min-height: 100svh;
  box-sizing: border-box;
  display: flex; align-items: center; justify-content: center;
  padding: 5rem 4rem;
}
@media (max-width: 768px) { .slide-inner { padding: 5rem 1.5rem; } }

/* ═══ Top bar ═══ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 2.5rem;
  transition: color 0.5s ease;
}
.topbar-logo {
  font-family: var(--serif); font-size: 0.95rem; font-weight: 600;
  color: var(--white); text-decoration: none; letter-spacing: -0.01em; cursor: pointer;
  transition: color 0.5s ease;
}
.topbar-domain {
  font-family: var(--sans); font-size: 0.7rem; font-weight: 400;
  color: var(--white); opacity: 0.5; letter-spacing: 0.06em; text-transform: uppercase;
  transition: color 0.5s ease;
}

/* ═══ Nav dots ═══ */
.slide-nav {
  position: fixed; right: 2.5rem; top: 50%; transform: translateY(-50%);
  z-index: 100; display: flex; flex-direction: column; gap: 0.45rem;
}
.slide-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.15); cursor: pointer;
  transition: all 0.5s ease; border: none; padding: 0;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.slide-dot::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 44px;
  height: 44px;
}
.slide-dot.active { background: rgba(255,255,255,0.5); transform: scale(1.3); }
.slide-dot:hover { background: rgba(255,255,255,0.35); }

.slide-arrows {
  position: fixed; bottom: 2.5rem; right: 2.5rem; z-index: 100;
  display: flex; gap: 0.5rem;
}
.slide-arrow {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.3); background: transparent;
  color: var(--white); cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.5s ease;
  -webkit-tap-highlight-color: transparent;
}
.slide-arrow:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }

.slide-counter {
  position: fixed; bottom: 2.75rem; left: 2.5rem; z-index: 100;
  font-family: var(--sans); font-size: 0.6rem; font-weight: 300;
  color: rgba(255,255,255,0.35); letter-spacing: 0.08em;
  transition: color 0.5s ease;
}

@media (max-width: 768px) {
  .slide-nav { display: none; }
  .topbar { padding: 1.25rem 1.5rem; }
  .slide-arrows { right: 1.5rem; bottom: 1.5rem; }
  .slide-counter { left: 1.5rem; bottom: 1.75rem; }
}

/* ═══ Kiosk mode: hide all chrome ═══ */
.topbar,
.slide-nav,
.slide-arrows,
.slide-counter,
.auto-counter,
.progress-bar {
  transition: opacity 0.5s ease;
}
body[data-kiosk] .slide-nav,
body[data-kiosk] .slide-arrows,
body[data-kiosk] .slide-counter,
body[data-kiosk] .auto-counter,
body[data-kiosk] .progress-bar {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
body[data-kiosk] .topbar-logo {
  pointer-events: none;
}
body[data-kiosk] .topbar {
  background: linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,255,255,0.9) 60%, transparent 100%);
  padding-bottom: 3rem;
}
body[data-kiosk] .topbar-domain {
  opacity: 0; pointer-events: none;
}
body[data-kiosk][data-nav-theme="dark"] .topbar {
  background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.75) 60%, transparent 100%);
}
body[data-kiosk] {
  cursor: none;
}
/* ═══ Kiosk auto-scroll: hide scrollbars on slides ═══ */
body[data-kiosk] .slide {
  scrollbar-width: none;
}
body[data-kiosk] .slide::-webkit-scrollbar { display: none; }
/* ═══ Kiosk: vertically center content on short slides ═══ */
body[data-kiosk] .slide.kiosk-short {
  align-items: center;
  justify-content: center;
}
body[data-kiosk] .slide.kiosk-short .slide-inner {
  min-height: auto;
}

/* ═══ Nav theme: light slides ═══ */
body[data-nav-theme="light"] .topbar-logo { color: var(--black); }
body[data-nav-theme="light"] .topbar-domain { color: var(--black); }
body[data-nav-theme="light"] .slide-dot { background: rgba(0,0,0,0.12); }
body[data-nav-theme="light"] .slide-dot.active { background: rgba(0,0,0,0.4); }
body[data-nav-theme="light"] .slide-dot:hover { background: rgba(0,0,0,0.25); }
body[data-nav-theme="light"] .slide-arrow { color: var(--black); border-color: rgba(0,0,0,0.25); }
body[data-nav-theme="light"] .slide-arrow:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.5); }
body[data-nav-theme="light"] .slide-counter { color: rgba(0,0,0,0.3); }
body[data-nav-theme="light"] .auto-counter { color: var(--black); }
body[data-nav-theme="light"] .progress-bar { background: rgba(0,0,0,0.04); }
body[data-nav-theme="light"] .progress-fill { background: rgba(0,0,0,0.25); }

/* ═══ Typography ═══ */
.t-display {
  font-family: var(--serif); font-size: clamp(2.8rem, 7vw, 6.5rem);
  font-weight: 400; line-height: 1.05; letter-spacing: -0.03em;
}
.t-heading {
  font-family: var(--serif); font-size: clamp(2rem, 4vw, 3.8rem);
  font-weight: 400; line-height: 1.12; letter-spacing: -0.02em;
}
.t-subheading {
  font-family: var(--serif); font-size: clamp(1.4rem, 2.5vw, 2rem);
  font-weight: 400; line-height: 1.3; letter-spacing: -0.01em;
}
.t-body {
  font-family: var(--sans); font-size: clamp(0.95rem, 1.1vw, 1.1rem);
  font-weight: 300; line-height: 1.75; color: var(--gray-600); max-width: 58ch;
}
.t-caption {
  font-family: var(--sans); font-size: 0.7rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--gray-400);
}
.t-italic { font-style: italic; }

/* ═══ Slide variants ═══ */
.cover { background: var(--black); color: var(--white); }
.cover .slide-inner { flex-direction: column; text-align: center; gap: 2rem; }
.cover .t-display { color: var(--white); }
.cover .t-body { color: rgba(255,255,255,0.5); }
.cover .t-caption { color: rgba(255,255,255,0.3); }

.split .slide-inner {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  padding: 0; align-items: stretch;
}
.split-text {
  display: flex; flex-direction: column; justify-content: center;
  padding: 5rem 4rem; gap: 1.5rem;
}
.split-image { background-size: cover; background-position: center; min-height: 100dvh; }
.split-reverse .slide-inner { grid-template-columns: 1fr 1fr; }
.split-reverse .split-image { order: -1; }
@media (max-width: 900px) {
  .split .slide-inner, .split-reverse .slide-inner { grid-template-columns: 1fr; }
  .split-image { min-height: 40vh; order: -1; }
  .split-text { padding: 3rem 1.5rem; }
}

/* Text-only deep dive slide */
.deep-slide .slide-inner {
  max-width: 900px; margin: 0 auto; flex-direction: column;
  align-items: flex-start; justify-content: flex-start; gap: 2rem; padding-top: 6rem; padding-bottom: 6rem;
}
.deep-stat-row {
  display: flex; gap: 3rem; flex-wrap: wrap; margin: 1rem 0;
}
.deep-stat { text-align: left; }
.deep-stat-val {
  font-family: var(--serif); font-size: 2.5rem; font-weight: 400; line-height: 1;
}
.deep-stat-label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--gray-400); margin-top: 0.35rem; font-weight: 500;
}
.highlight-list { list-style: none; padding: 0; }
.highlight-list li {
  padding: 0.75rem 0; border-bottom: 1px solid var(--gray-200);
  font-size: 0.95rem; font-weight: 300; color: var(--gray-600); line-height: 1.6;
}
.highlight-list li:last-child { border-bottom: none; }
.highlight-list li strong { font-weight: 500; color: var(--black); }
.dark-slide .highlight-list li { border-color: var(--gray-800); color: rgba(255,255,255,0.55); }
.dark-slide .highlight-list li strong { color: white; }

.full-image { background-size: cover; background-position: center; color: var(--white); }
.full-image::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.3) 100%);
  z-index: 1;
}
.full-image .slide-inner { position: relative; z-index: 2; align-items: flex-end; padding-bottom: 6rem; }
.full-image .t-body { color: rgba(255,255,255,0.6); }
.full-image .t-caption { color: rgba(255,255,255,0.35); }

.dark-slide { background: var(--black); color: var(--white); }
.dark-slide .t-body { color: rgba(255,255,255,0.55); }
.dark-slide .t-caption { color: rgba(255,255,255,0.3); }
.dark-slide .t-heading { color: var(--white); }

.letter-slide .slide-inner {
  max-width: 780px; margin: 0 auto; flex-direction: column;
  gap: 0; padding-top: 6rem; padding-bottom: 6rem; align-items: flex-start; justify-content: flex-start;
}
.letter-text p {
  font-family: var(--sans); font-size: 1rem; font-weight: 300;
  line-height: 1.85; color: var(--gray-600); margin-bottom: 1.25rem;
}
.letter-text p:first-child::first-letter {
  font-family: var(--serif); font-size: 4rem; float: left;
  line-height: 0.85; margin-right: 0.6rem; margin-top: 0.15rem;
  color: var(--black); font-weight: 600;
}
.letter-sig {
  font-family: var(--serif); font-size: 1.4rem; font-style: italic;
  margin-top: 1.5rem; color: var(--black);
}

.grid-slide .slide-inner {
  flex-direction: column; align-items: flex-start; justify-content: flex-start;
  max-width: 1200px; margin: 0 auto; gap: 2.5rem; padding-top: 6rem;
}

/* ═══ Content components ═══ */
.project-row {
  display: grid; grid-template-columns: 200px 1fr; gap: 1rem 3rem;
  padding: 1.75rem 0; border-bottom: 1px solid var(--gray-200); width: 100%;
  align-items: baseline;
}
.project-row:last-child { border-bottom: none; }
.project-name { font-family: var(--serif); font-size: 1.5rem; font-weight: 500; }
.project-desc { font-size: 0.95rem; font-weight: 300; color: var(--gray-600); line-height: 1.7; }
@media (max-width: 768px) { .project-row { grid-template-columns: 1fr; gap: 0.5rem; } }

.pub-row {
  display: grid; grid-template-columns: 50px 1fr auto; gap: 1rem 1.5rem;
  padding: 1rem 0; border-bottom: 1px solid var(--gray-200); width: 100%;
  align-items: baseline; font-size: 0.875rem;
}
.pub-row:last-child { border-bottom: none; }
.pub-yr { font-family: var(--serif); font-weight: 500; color: var(--gray-400); }
.pub-cite { font-weight: 300; color: var(--gray-600); line-height: 1.6; }
.pub-cite strong { font-weight: 500; color: var(--black); }
.pub-link {
  font-size: 0.75rem; font-weight: 500; text-decoration: none; color: var(--black);
  border-bottom: 1px solid var(--gray-200); white-space: nowrap; transition: border-color 0.3s;
}
.pub-link:hover { border-color: var(--black); }
a.pub-row:hover { opacity: 0.6; }
@media (max-width: 768px) { .pub-row { grid-template-columns: 1fr; } }

.team-grid-wrap {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 2.5rem 2rem; width: 100%;
}
.team-person { text-align: center; }
.team-avatar {
  width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 0.75rem;
  background: var(--gray-200); display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 1.4rem; color: var(--gray-500);
}
.team-person-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 0.15rem; }
.team-person-role { font-size: 0.75rem; color: var(--gray-500); font-weight: 300; }

.media-row { padding: 1.5rem 0; border-bottom: 1px solid var(--gray-200); width: 100%; }
.media-row:last-child { border-bottom: none; }
.media-row a {
  display: flex; justify-content: space-between; align-items: baseline;
  text-decoration: none; gap: 2rem; flex-wrap: wrap;
}
.media-title {
  font-family: var(--serif); font-size: 1.15rem; font-weight: 500;
  color: var(--black); transition: opacity 0.3s;
}
.media-row a:hover .media-title { opacity: 0.6; }
.media-source { font-size: 0.75rem; color: var(--gray-400); font-weight: 400; white-space: nowrap; }

.video-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; width: 100%; }
.video-wrap { border-radius: 8px; overflow: hidden; background: var(--black); }
.video-wrap iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
.video-label { padding: 1rem 0 0; font-size: 0.8rem; color: var(--gray-500); font-weight: 300; }
@media (max-width: 768px) { .video-pair { grid-template-columns: 1fr; } }
@media (max-width: 768px) { .wolfond-brothers-grid { grid-template-columns: 1fr !important; gap: 3rem !important; } }
@media (max-width: 900px) { .convo-video-grid { grid-template-columns: 1fr 1fr !important; } }
@media (max-width: 600px) { .convo-video-grid { grid-template-columns: 1fr !important; } }

.convo-thumb {
  position: relative; display: block; border-radius: 8px; overflow: hidden;
  aspect-ratio: 16 / 9; background: var(--gray-800); text-decoration: none; cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.convo-thumb:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
.convo-thumb img {
  width: 100%; height: 100%; object-fit: cover;
  filter: grayscale(1) contrast(1.1); opacity: 0.85;
  transition: opacity 0.3s ease;
}
.convo-thumb:hover img { opacity: 1; }
.convo-thumb .thumb-monogram {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 2.5rem; font-weight: 600; color: rgba(255,255,255,0.25);
  letter-spacing: 0.05em;
}
.convo-thumb .thumb-play {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s ease;
}
.convo-thumb:hover .thumb-play { opacity: 1; }
.convo-thumb .thumb-play-circle {
  width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.9);
  display: flex; align-items: center; justify-content: center;
}
.convo-thumb .thumb-play-circle::after {
  content: ''; display: block; width: 0; height: 0;
  border-top: 10px solid transparent; border-bottom: 10px solid transparent;
  border-left: 16px solid var(--black); margin-left: 3px;
}

.convo-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 2rem; width: 100%;
}
.convo-card {
  padding: 2rem; border: 1px solid var(--gray-200); border-radius: 8px;
  transition: border-color 0.3s;
}
.convo-card:hover { border-color: var(--gray-400); }
.convo-card h3 { font-family: var(--serif); font-size: 1.2rem; font-weight: 500; margin-bottom: 0.25rem; }
.convo-card .convo-role {
  font-size: 0.75rem; color: var(--gray-400); font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem;
}
.convo-card p { font-size: 0.875rem; color: var(--gray-600); line-height: 1.6; font-weight: 300; }

.scroll-content {
  width: 100%; overflow: visible;
}

.pub-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.pub-filter {
  padding: 0.4rem 1rem; border-radius: 100px; border: 1px solid var(--gray-200);
  background: transparent; font-family: var(--sans); font-size: 0.75rem;
  font-weight: 500; color: var(--gray-500); cursor: pointer; transition: all 0.3s;
}
.pub-filter:hover { border-color: var(--gray-400); color: var(--black); }
.pub-filter.active { background: var(--black); color: var(--white); border-color: var(--black); }

.progress-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 1px;
  background: rgba(255,255,255,0.04); z-index: 100;
  transition: background 0.5s ease;
}
.progress-fill {
  height: 100%; width: 0%; background: rgba(255,255,255,0.3);
  transition: width 0.6s ease, background 0.5s ease;
}

/* ═══ Auto-advance counter ═══ */
.auto-counter {
  position: fixed; bottom: 2.95rem; right: 10rem; z-index: 99;
  font-family: var(--sans); font-size: 0.6rem; font-weight: 400;
  color: var(--white);
  letter-spacing: 0.06em; opacity: 0.4;
  font-variant-numeric: tabular-nums;
  transition: color 0.5s ease;
}

/* ═══ Video Modal ═══ */
.video-modal {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(10,10,10,0.96); display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; backdrop-filter: blur(12px);
  opacity: 0; transition: opacity 0.35s ease;
}
.video-modal.open { display: flex; }
.video-modal.visible { opacity: 1; }
.video-modal-brand {
  position: absolute; top: 1.5rem; left: 2.5rem;
  font-family: var(--serif); font-size: 0.95rem; font-weight: 600;
  color: rgba(255,255,255,0.35); letter-spacing: -0.01em;
  pointer-events: none;
}
.video-modal-inner {
  width: 90vw; max-width: 960px; aspect-ratio: 16/9;
  position: relative; cursor: default;
  transform: scale(0.95); transition: transform 0.35s ease;
}
.video-modal.visible .video-modal-inner { transform: scale(1); }
.video-modal-inner iframe {
  width: 100%; height: 100%; border: none; border-radius: 8px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}
.video-modal-close {
  position: absolute; top: -2.5rem; right: 0;
  background: none; border: none; color: rgba(255,255,255,0.5);
  font-size: 1.5rem; cursor: pointer; font-family: var(--sans); font-weight: 300;
  transition: color 0.2s;
}
.video-modal-close:hover { color: white; }
.video-modal-caption {
  margin-top: 1.25rem; font-family: var(--sans); font-size: 0.75rem;
  color: rgba(255,255,255,0.25); font-weight: 400; letter-spacing: 0.06em;
  text-transform: uppercase; pointer-events: none;
}
</style>
</head>
<body>

<!-- Video Modal Overlay -->
<div class="video-modal" id="videoModal" onclick="closeVideoModal(event)">
  <div class="video-modal-brand">The Wolfond Chair</div>
  <div class="video-modal-inner">
    <button class="video-modal-close" onclick="closeVideoModal(event)">&times;</button>
    <iframe id="videoModalFrame" src="" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
  </div>
  <div class="video-modal-caption" id="videoModalCaption"></div>
</div>

<div class="topbar">

// ═══ VIDEO MODAL ═══
function openVideoModal(vimeoId, caption) {
  if (isKioskMode) return; // suppress modals in kiosk
  const modal = document.getElementById('videoModal');
  const frame = document.getElementById('videoModalFrame');
  const cap = document.getElementById('videoModalCaption');
  frame.src = 'https://player.vimeo.com/video/' + vimeoId + '?autoplay=1&title=0&byline=0&portrait=0&badge=0&pip=0&vimeo_logo=0&dnt=1';
  cap.textContent = caption || 'Voices from the Centre';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(() => { requestAnimationFrame(() => { modal.classList.add('visible'); }); });
}
function closeVideoModal(e) {
  if (e && e.target.closest('.video-modal-inner') && !e.target.closest('.video-modal-close')) return;
  const modal = document.getElementById('videoModal');
  const frame = document.getElementById('videoModalFrame');
  modal.classList.remove('visible');
  setTimeout(() => { frame.src = ''; modal.classList.remove('open'); }, 350);
  document.body.style.overflow = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('videoModal').classList.contains('open')) {
    closeVideoModal();
  }
});

// ═══ CONVERSATIONS AUTO-PLAY (inside existing thumbnails) ═══
const CONVO_VIDEOS = [
  { id: '1169672887', name: 'Jaclyn Hearnden' },
  { id: '1169673203', name: 'Jenny Wei' },
  { id: '1169673412', name: 'Soyun Oh' },
  { id: '1169673903', name: 'Ken Christofferson' },
  { id: '1169673570', name: 'Ting Xiong' },
];
const CONVO_SLIDE_INDEX = 13;
let convoPickIndex = -1;

function setupConvoAutoplay() {
  convoPickIndex = Math.floor(Math.random() * CONVO_VIDEOS.length);
}

function startConvoAutoplay() {
  if (convoPickIndex < 0) return;
  const slot = document.querySelector('[data-convo-index="' + convoPickIndex + '"]');
  if (!slot) return;
  const thumb = slot.querySelector('.convo-thumb');
  if (!thumb || thumb.querySelector('.convo-inline-video')) return;
  const vid = CONVO_VIDEOS[convoPickIndex];
  const iframe = document.createElement('iframe');
  iframe.className = 'convo-inline-video';
  iframe.src = 'https://player.vimeo.com/video/' + vid.id + '?background=1&autoplay=1&muted=1&loop=1&badge=0&pip=0&vimeo_logo=0&dnt=1';
  iframe.allow = 'autoplay';
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1;pointer-events:none;border-radius:8px;';
  // Hide the static image behind the video
  const img = thumb.querySelector('img');
  if (img) img.style.opacity = '0';
  thumb.appendChild(iframe);
}

function stopConvoAutoplay() {
  document.querySelectorAll('.convo-inline-video').forEach(f => {
    const thumb = f.closest('.convo-thumb');
    if (thumb) { const img = thumb.querySelector('img'); if (img) img.style.opacity = '0.85'; }
    f.remove();
  });
}

// ═══ VIDEO MUTE TOGGLE (Media page) ═══
function toggleVideoMute(btn) {
  var targetId = btn.getAttribute('data-target');
  var iframe = document.getElementById(targetId);
  if (!iframe || !iframe.src || iframe.src === '') return;
  var muted = btn.getAttribute('data-muted') === 'true';
  var src = iframe.src;
  if (muted) {
    // Unmute: swap muted=1 → muted=0, keep background=1 for no UI
    iframe.src = src.replace('muted=1', 'muted=0');
    btn.setAttribute('data-muted', 'false');
    btn.textContent = '\u{1F50A}';
    btn.style.borderColor = 'rgba(255,255,255,0.7)';
  } else {
    // Mute: swap muted=0 → muted=1
    iframe.src = src.replace('muted=0', 'muted=1');
    btn.setAttribute('data-muted', 'true');
    btn.textContent = '\u{1F507}';
    btn.style.borderColor = 'rgba(255,255,255,0.3)';
  }
}

// ═══ AUTO-ADVANCE TIMER ═══
let autoTimer = null;
let countdownTimer = null;
let secondsLeft = 120;
const AUTO_SECONDS = 120; // 2 minutes
let autoTimerPaused = false;

function updateCounterDisplay() {
  const el = document.getElementById('autoCounter');
  if (!el) return;
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  el.textContent = m + ':' + String(s).padStart(2, '0');
}

function getSlideDuration() {
  var slideEl = slides[current];
  var dur = slideEl ? slideEl.getAttribute('data-duration') : null;
  return dur ? parseInt(dur, 10) : AUTO_SECONDS;
}

function startAutoAdvance() {
  stopAutoAdvance();
  secondsLeft = getSlideDuration();
  updateCounterDisplay();
  countdownTimer = setInterval(() => {
    secondsLeft--;
    if (secondsLeft < 0) secondsLeft = 0;
    updateCounterDisplay();
  }, 1000);
  autoTimer = setInterval(() => {
    if (document.getElementById('videoModal').classList.contains('open')) return;
    if (current < slides.length - 1) {
      goToSlide(current + 1);
    } else {
      goToSlide(0);
    }
  }, getSlideDuration() * 1000);
}

function stopAutoAdvance() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}

function resetAutoAdvance() {
  startAutoAdvance();
}

// ═══ KIOSK MODE ═══
function startCursorHideTimer() {
  clearCursorHideTimer();
  cursorHideTimer = setTimeout(() => {
    if (isKioskMode) document.body.style.cursor = 'none';
  }, 3000);
}
function clearCursorHideTimer() {
  if (cursorHideTimer) { clearTimeout(cursorHideTimer); cursorHideTimer = null; }
  document.body.style.cursor = '';
}
function enterKiosk() {
  isKioskMode = true;
  document.body.setAttribute('data-kiosk', '');
  // Pre-classify all slides as short (kiosk-short) to prevent centering jump;
  // startAutoScroll will remove the class for slides that need scrolling
  for (var i = 0; i < slides.length; i++) { slides[i].classList.add('kiosk-short'); }
  startAutoAdvance(); // fresh timer from current slide
  startAutoScroll();
  // Request fullscreen
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  // Start cursor hide timer
  startCursorHideTimer();
}
function exitKiosk() {
  isKioskMode = false;
  document.body.removeAttribute('data-kiosk');
  stopAutoAdvance();
  stopAutoScroll();
  for (var i = 0; i < slides.length; i++) { resetSlideScroll(slides[i]); }
  // Exit fullscreen if active
  if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
  // Clear cursor hide timer, restore cursor
  clearCursorHideTimer();
  // Restart normal auto-advance
  startAutoAdvance();
}

document.addEventListener('mousemove', () => {
  if (isKioskMode) {
    document.body.style.cursor = '';
    startCursorHideTimer();
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // Tab hidden — pause both intervals if running
    if (autoTimer !== null || countdownTimer !== null) {
      stopAutoAdvance();
      autoTimerPaused = true;
    }
  } else if (autoTimerPaused) {
    // Tab visible again — resume from remaining seconds
    autoTimerPaused = false;
    if (secondsLeft <= 0) {
      // Tab was hidden longer than timer duration — restart fresh
      startAutoAdvance();
    } else {
      // Resume countdown display from where it left off
      updateCounterDisplay();
      countdownTimer = setInterval(() => {
        secondsLeft--;
        if (secondsLeft < 0) secondsLeft = 0;
        updateCounterDisplay();
      }, 1000);
      // Fire slide advance after remaining seconds
      autoTimer = setInterval(() => {
        if (document.getElementById('videoModal').classList.contains('open')) return;
        if (current < slides.length - 1) {
          goToSlide(current + 1);
        } else {
          goToSlide(0);
        }
        // goToSlide() calls resetAutoAdvance() internally, which restarts fresh
      }, secondsLeft * 1000);
    }
  }
});

// ═══ AUTO-SCROLL ═══
var autoScrollRAF = null;      // requestAnimationFrame ID
var autoScrollActive = false;  // whether auto-scroll loop is running
var autoScrollStartTime = 0;   // timestamp when scroll began (after initial pause)
var autoScrollPaused = true;   // true during initial pause (if any)
var SCROLL_PAUSE_MS = 0;       // no pause — start scrolling/zooming immediately

function startAutoScroll() {
  stopAutoScroll();
  var slideEl = slides[current];
  if (!slideEl) return;
  // Check if slide has scrollable content (single unified scroll, no embedded areas)
  if (slideEl.scrollHeight - slideEl.clientHeight > 10) {
    // Tall slide — auto-scroll from top to bottom
    slideEl.classList.remove('kiosk-short');
    slideEl.scrollTop = 0;
    autoScrollActive = true;
    autoScrollPaused = true;
    autoScrollStartTime = performance.now();
    autoScrollRAF = requestAnimationFrame(autoScrollTick);
  } else {
    // Short slide — vertical centering
    slideEl.classList.add('kiosk-short');
    // Ken Burns zoom only on title (slide 0) and thank-you (last slide)
    if (current === 0 || current === slides.length - 1) {
      startKenBurns(slideEl);
    }
  }
}

function autoScrollTick(timestamp) {
  if (!autoScrollActive) return;
  if (autoScrollPaused) {
    if (timestamp - autoScrollStartTime >= SCROLL_PAUSE_MS) {
      autoScrollPaused = false;
      autoScrollStartTime = timestamp;
    } else {
      autoScrollRAF = requestAnimationFrame(autoScrollTick);
      return;
    }
  }
  var slideEl = slides[current];
  var scrollableDistance = slideEl.scrollHeight - slideEl.clientHeight;
  if (scrollableDistance <= 0) { autoScrollActive = false; return; }
  // Use minimum speed of 12px/sec so scroll is clearly visible
  var MIN_PX_PER_SEC = 12;
  var timeBudget = (getSlideDuration() * 1000) - SCROLL_PAUSE_MS - 2000;
  if (timeBudget <= 0) timeBudget = 1000;
  var minSpeedDuration = (scrollableDistance / MIN_PX_PER_SEC) * 1000;
  var duration = Math.min(timeBudget, minSpeedDuration);
  var elapsed = timestamp - autoScrollStartTime;
  var progress = Math.min(elapsed / duration, 1.0);
  slideEl.scrollTop = progress * scrollableDistance;
  if (progress < 1.0) {
    autoScrollRAF = requestAnimationFrame(autoScrollTick);
  } else {
    autoScrollActive = false;
  }
}

function stopAutoScroll() {
  if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; }
  autoScrollActive = false;
  stopKenBurns();
}

function resetSlideScroll(slideEl) {
  slideEl.scrollTop = 0;
  slideEl.style.transform = '';
  slideEl.style.transformOrigin = '';
  slideEl.classList.remove('kiosk-short');
}

function startKenBurns(slideEl) {
  autoScrollActive = true;
  autoScrollStartTime = performance.now();
  autoScrollPaused = true;
  autoScrollRAF = requestAnimationFrame(kenBurnsTick);
}

function kenBurnsTick(timestamp) {
  if (!autoScrollActive) return;
  if (autoScrollPaused) {
    if (timestamp - autoScrollStartTime >= SCROLL_PAUSE_MS) {
      autoScrollPaused = false;
      autoScrollStartTime = timestamp;
    } else {
      autoScrollRAF = requestAnimationFrame(kenBurnsTick);
      return;
    }
  }
  var slideEl = slides[current];
  var KB_DURATION_MS = 20000; // 20-second ease-in-out zoom cycle
  var elapsed = timestamp - autoScrollStartTime;
  // Ease in-out: scale 1.0 → 1.4 over 20s using quadratic easing
  var t = Math.min(elapsed / KB_DURATION_MS, 1.0);
  var eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // ease-in-out quad
  var scale = 1 + (0.40 * eased);
  slideEl.style.transform = 'scale(' + scale + ')';
  slideEl.style.transformOrigin = 'center center';
  if (t < 1.0) {
    autoScrollRAF = requestAnimationFrame(kenBurnsTick);
  } else {
    autoScrollActive = false;
  }
}

function stopKenBurns() {
  for (var i = 0; i < slides.length; i++) {
    slides[i].style.transform = '';
    slides[i].style.transformOrigin = '';
    slides[i].classList.remove('kiosk-short');
  }
}

// ═══ ENGINE ═══
var current = 0;
var slides = [];
var isTransitioning = false;
var isKioskMode = false;
var cursorHideTimer = null;

function init() {
  const deck = document.getElementById('deck');
  const slidesHTML = buildSlides();
  deck.innerHTML = slidesHTML.join('');
  slides = deck.querySelectorAll('.slide');

  const nav = document.getElementById('slideNav');
  nav.innerHTML = slidesHTML.map((_, i) =>
    `<button class="slide-dot${i===0?' active':''}" onclick="goToSlide(${i})" aria-label="Slide ${i+1}"></button>`
  ).join('');

  slides[0].classList.add('active');
  applyNavTheme(slides[0]);
  updateCounter();
  buildPubList();
  setupConvoAutoplay();
  startAutoAdvance();

  // ?kiosk URL param — enter kiosk mode without keyboard
  if (new URLSearchParams(window.location.search).has('kiosk')) {
    enterKiosk();
  }
}

function getSlideTheme(slideEl) {
  const cl = slideEl.classList;
  return (cl.contains('dark-slide') || cl.contains('cover') || cl.contains('full-image')) ? 'dark' : 'light';
}
function applyNavTheme(slideEl) {
  document.body.setAttribute('data-nav-theme', getSlideTheme(slideEl));
}

function goToSlide(index) {
  if (index === current || isTransitioning || index < 0 || index >= slides.length) return;
  isTransitioning = true;
  const prev = slides[current];
  const next = slides[index];
  prev.classList.remove('active');
  prev.classList.add('exiting');
  next.classList.add('active');
  setTimeout(() => { prev.classList.remove('exiting'); isTransitioning = false; }, 800);
  current = index;
  // Reset previous slide scroll position and stop auto-scroll
  resetSlideScroll(prev);
  if (isKioskMode) {
    stopAutoScroll();
    setTimeout(function() { if (isKioskMode) startAutoScroll(); }, 850);
  }
  document.querySelectorAll('.slide-dot').forEach((d, i) => d.classList.toggle('active', i === current));
  applyNavTheme(slides[current]);
  updateCounter();
  // Autoplay Media videos on the Media slide (index 12)
  const cdtxFrame = document.getElementById('mediaCdtxFrame');
  const chinFrame = document.getElementById('mediaChinFrame');
  if (cdtxFrame) {
    if (index === 12) {
      cdtxFrame.src = 'https://player.vimeo.com/video/1169720277?background=1&autoplay=1&muted=1&loop=1&badge=0&pip=0&vimeo_logo=0&dnt=1';
    } else {
      cdtxFrame.src = '';
    }
  }
  if (chinFrame) {
    if (index === 12) {
      chinFrame.src = 'https://player.vimeo.com/video/1169720780?background=1&autoplay=1&muted=1&loop=1&texttrack=en&badge=0&pip=0&vimeo_logo=0&dnt=1';
    } else {
      chinFrame.src = '';
    }
  }
  // Reset mute buttons to muted state when entering Media slide
  if (index === 12) {
    document.querySelectorAll('.video-mute-btn').forEach(function(btn) {
      btn.setAttribute('data-muted', 'true');
      btn.textContent = '\u{1F507}';
      btn.style.borderColor = 'rgba(255,255,255,0.3)';
    });
  }
  // Autoplay Greg's video on the Wolfond Brothers slide
  const gregFrame = document.getElementById('gregAutoplayFrame');
  if (gregFrame) {
    if (index === slides.length - 1) {
      gregFrame.src = 'https://player.vimeo.com/video/1169716954?background=1&autoplay=1&muted=1&loop=1&badge=0&pip=0&vimeo_logo=0&dnt=1';
    } else {
      gregFrame.src = '';
    }
  }
  // Autoplay random conversation video on Conversations slide
  if (index === CONVO_SLIDE_INDEX) {
    startConvoAutoplay();
  } else {
    stopConvoAutoplay();
  }
  // Reset auto-advance timer on any navigation
  resetAutoAdvance();
}

function nextSlide() { goToSlide(current + 1 >= slides.length ? 0 : current + 1); resetAutoAdvance(); }
function prevSlide() { goToSlide(current - 1); resetAutoAdvance(); }
function updateCounter() {
  document.getElementById('slideCounter').textContent =
    String(current + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
  const pct = ((current) / (slides.length - 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

// Keyboard — arrow keys only (K key toggles kiosk mode)
document.addEventListener('keydown', (e) => {
  if (e.key === 'k' || e.key === 'K') {
    e.preventDefault();
    if (isKioskMode) exitKiosk();
    else enterKiosk();
    return;
  }
  if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); return; }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); return; }
  if (isKioskMode) return; // suppress all other keys in kiosk (arrows allowed above)
});

// Tap-to-navigate — tap right side to advance, left side to go back
document.addEventListener('click', (e) => {
  if (isKioskMode) return; // suppress all clicks in kiosk
  // Ignore clicks on interactive elements
  if (e.target.closest('a, button, input, select, textarea, iframe, .convo-thumb, .scroll-content, .slide-arrow, .slide-dot, .slide-nav, .topbar, .video-modal, .pub-filter, .video-mute-btn, .tl-feature')) return;
  const x = e.clientX;
  const w = window.innerWidth;
  if (x > w / 2) nextSlide();
  else prevSlide();
});

// Swipe-to-navigate — horizontal swipe advances/retreats; vertical scroll unaffected
let swipeStartX = 0;
let swipeStartY = 0;
document.addEventListener('touchstart', (e) => {
  swipeStartX = e.changedTouches[0].clientX;
  swipeStartY = e.changedTouches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  if (isKioskMode) return; // suppress all swipes in kiosk
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) nextSlide();
    else prevSlide();
  }
}, { passive: true });

// ═══ PUB LIST ═══
function buildPubList() {
  const list = document.getElementById('pubList');
  if (!list) return;
  list.innerHTML = publications.map(p => `
    <a href="https://doi.org/${p.doi}" target="_blank" class="pub-row" style="text-decoration: none; display: grid; grid-template-columns: 50px 1fr; gap: 1rem 1.5rem; padding: 1.25rem 0; border-bottom: 1px solid var(--gray-200); width: 100%; align-items: baseline; transition: opacity 0.2s;">
      <div class="pub-yr">${p.year}</div>
      <div class="pub-cite">${p.cite}</div>
    </a>
  `).join('');
}

window.addEventListener('load', init);
</script>
